# ╔═══════════════════════════════════════════════════════════════╗
# ║    RED TEAM VULNDB - APPLICATION CONFIGURATION               ║
# ╚═══════════════════════════════════════════════════════════════╝

# ─── Sunucu Ayarları ─────────────────────────────────────────────
server.port=8080

# ─── PostgreSQL Veritabanı Bağlantısı ───────────────────────────
# JDBC URL formatı: jdbc:postgresql://host:port/database_name
# Veritabanı önceden oluşturulmalı: CREATE DATABASE vulndb;
spring.datasource.url=jdbc:postgresql://localhost:5432/vulndb
spring.datasource.username=postgres
spring.datasource.password=postgres
spring.datasource.driver-class-name=org.postgresql.Driver

# ─── JPA / Hibernate Ayarları ────────────────────────────────────
# update: Yeni kolon/tablo ekler, mevcut veriyi silmez
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true

# ─── Multipart Dosya Yükleme (BLOB için) ────────────────────────
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# ─── Thymeleaf Ayarları ─────────────────────────────────────────
spring.thymeleaf.cache=false

# ─── Uygulama Adı ───────────────────────────────────────────────
spring.application.name=RedTeam-VulnDB

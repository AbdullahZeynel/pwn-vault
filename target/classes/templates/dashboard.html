<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security" lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="'RedTeam VulnDB :: ' + ${project.name}">Dashboard</title>
    <link rel="stylesheet" th:href="@{/css/terminal.css}">
</head>
<body>
    <nav class="navbar">
        <a th:href="@{/projects}" class="nav-brand">
            <span class="nav-brand-icon">🛡️</span> RedTeam VulnDB
        </a>
        <div class="nav-right">
            <span class="nav-user" sec:authentication="name">operator</span>
            <button class="theme-toggle" onclick="toggleTheme()" title="Tema Değiştir">🌙</button>
            <form th:action="@{/logout}" method="post" class="logout-form">
                <button type="submit" class="btn btn-nav">Çıkış</button>
            </form>
        </div>
    </nav>

    <div class="main-container">
        <!-- Breadcrumb -->
        <div style="margin-bottom:8px;">
            <a th:href="@{/projects}" class="breadcrumb-link">Projeler</a>
            <span style="color:var(--text-muted);margin:0 6px;">›</span>
            <span style="color:var(--text-secondary)" th:text="${project.name}">Proje</span>
        </div>

        <div class="page-header">
            <div>
                <h1 class="page-title" th:text="${project.name}">Dashboard</h1>
                <p class="page-subtitle" th:text="${project.description ?: 'Vulnerability kayıtlarını yönetin'}"></p>
            </div>
            <a th:href="@{'/projects/' + ${project.id} + '/vulnerability/new'}" class="btn btn-primary">+ Yeni Kayıt</a>
        </div>

        <!-- Alerts -->
        <div th:if="${successMessage}" class="alert alert-success">
            ✓ <span th:text="${successMessage}"></span>
        </div>
        <div th:if="${errorMessage}" class="alert alert-danger">
            ⚠ <span th:text="${errorMessage}"></span>
        </div>

        <!-- Search -->
        <div class="action-bar">
            <form th:action="@{'/projects/' + ${project.id} + '/dashboard'}" method="get" class="search-form">
                <div class="search-group">
                    <input type="text" name="search" class="form-input search-input"
                           placeholder="Başlık veya hedef sistem ara..." th:value="${searchKeyword}">
                    <button type="submit" class="btn btn-primary">Ara</button>
                    <a th:href="@{'/projects/' + ${project.id} + '/dashboard'}" class="btn btn-ghost">Sıfırla</a>
                </div>
            </form>
        </div>

        <div th:if="${searchKeyword}" class="search-info">
            "<strong th:text="${searchKeyword}"></strong>" için
            <strong th:text="${vulnerabilities.size()}"></strong> sonuç bulundu.
        </div>

        <!-- Table -->
        <div class="table-card">
            <table class="data-table">
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>Başlık</th>
                        <th>Hedef Sistem</th>
                        <th>Şiddet</th>
                        <th>Tarih</th>
                        <th>İşlemler</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:if="${#lists.isEmpty(vulnerabilities)}" class="empty-row">
                        <td colspan="6">Henüz kayıt bulunmuyor. Yeni vulnerability ekleyin.</td>
                    </tr>
                    <tr th:each="vuln : ${vulnerabilities}">
                        <td th:text="${vuln.id}"></td>
                        <td><strong th:text="${vuln.title}"></strong></td>
                        <td th:text="${vuln.targetSystem}"></td>
                        <td>
                            <span class="badge" th:classappend="'badge-' + ${vuln.severity.name()}"
                                  th:text="${vuln.severity}"></span>
                        </td>
                        <td th:text="${vuln.createdAt != null ? #temporals.format(vuln.createdAt, 'dd.MM.yyyy HH:mm') : '-'}"></td>
                        <td class="action-cell">
                            <a th:href="@{'/vulnerability/' + ${vuln.id}}" class="btn btn-sm btn-outline">Detay</a>
                            <a th:href="@{'/vulnerability/' + ${vuln.id} + '/edit'}" class="btn btn-sm btn-ghost">Düzenle</a>
                            <form th:action="@{'/vulnerability/' + ${vuln.id} + '/delete'}"
                                  method="post" class="inline-form" onsubmit="return confirm('Bu kaydı silmek istediğinize emin misiniz?')">
                                <input type="hidden" name="projectId" th:value="${project.id}">
                                <button type="submit" class="btn btn-sm btn-danger">Sil</button>
                            </form>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>

        <p class="record-count">
            Toplam: <span th:text="${vulnerabilities.size()}">0</span> kayıt
        </p>
    </div>

    <script th:src="@{/js/app.js}"></script>
</body>
</html>
